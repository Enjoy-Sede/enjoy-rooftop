<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Enjoy Rooftop Bistrô — Cardápio</title>
<link rel="stylesheet" href="style.css">
<style>
  .container { max-width: 560px; margin: 0 auto; padding: 0 20px 80px; }

  /* ── IDENTIFY FORM ── */
  .identify-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px 20px;
    max-width: 420px;
    margin: 0 auto;
  }
  .identify-screen .page-header { border: none; margin-bottom: 40px; padding: 0; }
  .identify-screen .page-header::before { display: none; }

  .identify-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    padding: 32px;
    border-radius: 2px;
  }
  .identify-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--white);
    margin-bottom: 6px;
  }
  .identify-sub {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  /* ── MENU PAGE ── */
  .menu-screen { display: none; }

  .guest-bar {
    background: rgba(47,94,143,0.15);
    border-bottom: 1px solid var(--border-blue);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .guest-info {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    color: var(--cream-dim);
  }
  .guest-info strong { color: var(--white); }
  .guest-info .sep { color: var(--muted); margin: 0 6px; }

  /* ── TABS ── */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--navy);
    z-index: 10;
  }
  .tab {
    flex: 1;
    padding: 14px 8px;
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* ── MENU ITEM ── */
  .menu-section { padding: 28px 0 8px; }

  .menu-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 18px 0;
    border-bottom: 1px solid rgba(177,140,84,0.07);
    cursor: pointer;
    transition: background 0.15s;
    border-radius: 2px;
  }
  .menu-item:last-child { border-bottom: none; }

  .menu-item-body { flex: 1; min-width: 0; }
  .menu-item-cat {
    font-family: 'Montserrat', sans-serif;
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--blue-light);
    margin-bottom: 3px;
  }
  .menu-item-name {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    color: var(--white);
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .menu-item-desc {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-style: italic;
    color: var(--muted);
    line-height: 1.4;
  }
  .menu-item-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
    flex-shrink: 0;
  }
  .menu-item-subtipo {
    font-family: 'Montserrat', sans-serif;
    font-size: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── QTY CONTROL ── */
  .qty-control {
    display: flex;
    align-items: center;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .qty-btn {
    width: 30px;
    height: 30px;
    background: rgba(177,140,84,0.08);
    border: none;
    color: var(--gold);
    font-size: 16px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Montserrat', sans-serif;
  }
  .qty-btn:hover { background: rgba(177,140,84,0.2); }
  .qty-num {
    width: 32px;
    text-align: center;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--white);
  }

  /* ── CART ── */
  .cart-fab {
    position: fixed;
    bottom: 24px;
    right: 20px;
    background: var(--gold);
    color: var(--navy);
    border: none;
    border-radius: 2px;
    padding: 14px 20px;
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    display: none;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 20px rgba(177,140,84,0.3);
    transition: all 0.2s;
    z-index: 100;
  }
  .cart-fab:hover { background: var(--gold-light); transform: translateY(-2px); }
  .cart-fab .cart-count {
    background: var(--navy);
    color: var(--gold);
    border-radius: 1px;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
  }

  /* ── CART MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; align-items: flex-end; justify-content: center; }

  .modal {
    background: var(--navy-soft);
    border: 1px solid var(--border);
    border-bottom: none;
    width: 100%;
    max-width: 560px;
    max-height: 80vh;
    overflow-y: auto;
    border-radius: 4px 4px 0 0;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--navy-soft);
  }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--white);
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--white); }
  .modal-body { padding: 20px 24px; }
  .modal-footer {
    padding: 20px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    bottom: 0;
    background: var(--navy-soft);
  }
  .cart-total-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .cart-total-value {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--gold-light);
  }

  .cart-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(177,140,84,0.07);
  }
  .cart-row:last-child { border-bottom: none; }
  .cart-row-name {
    flex: 1;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    color: var(--cream);
  }
  .cart-row-qty {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }
  .cart-row-price {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    color: var(--gold);
    white-space: nowrap;
  }
  .cart-row-remove {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 4px;
    transition: color 0.15s;
  }
  .cart-row-remove:hover { color: #e07070; }

  .obs-area {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    padding: 12px;
    border-radius: 2px;
    resize: vertical;
    min-height: 70px;
    outline: none;
    margin-top: 16px;
  }
  .obs-area:focus { border-color: var(--gold); }
  .obs-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-top: 16px;
    margin-bottom: 6px;
  }

  /* ── SUCCESS ── */
  .success-screen {
    display: none;
    text-align: center;
    padding: 60px 24px;
    max-width: 420px;
    margin: 0 auto;
  }
  .success-icon {
    font-size: 48px;
    margin-bottom: 24px;
    animation: pulse 2s infinite;
  }
  .success-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--white);
    margin-bottom: 8px;
  }
  .success-sub {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-style: italic;
    color: var(--muted);
    margin-bottom: 32px;
  }
</style>
</head>
<body>

<!-- ══ IDENTIFY SCREEN ══════════════════════════ -->
<div id="identifyScreen" class="identify-screen">
  <div class="page-header">
    <div class="brand-label">Bem-vindo ao</div>
    <div class="brand-name">Enjoy Rooftop Bistrô</div>
    <div class="brand-sub">Cardápio Digital</div>
  </div>

  <div class="identify-card fade-up">
    <div class="identify-title">Identificação</div>
    <div class="identify-sub">Para iniciar seu pedido</div>

    <div class="form-group">
      <label class="form-label">Seu nome</label>
      <input type="text" id="inputNome" class="form-input" placeholder="Digite seu nome completo">
    </div>

    <div class="form-group">
      <label class="form-label">Ambiente</label>
      <select id="inputAmbiente" class="form-select">
        <option value="">Selecione o ambiente</option>
        <option>Sala Master</option>
        <option>Lounge VIP</option>
        <option>Lounge Disruption</option>
        <option>Sala Âncora</option>
        <option>Rooftop</option>
        <option>Varanda Disruption</option>
      </select>
    </div>

    <button class="btn btn-gold" style="width:100%;margin-top:8px;" onclick="iniciarPedido()">
      Ver Cardápio
    </button>
  </div>
</div>

<!-- ══ MENU SCREEN ═══════════════════════════════ -->
<div id="menuScreen" class="menu-screen">

  <div class="page-header" style="padding:24px 20px 20px;">
    <div class="brand-label">Enjoy Rooftop Bistrô</div>
    <div class="brand-name" style="font-size:22px;">Cardápio da Noite</div>
  </div>

  <div class="guest-bar">
    <div class="guest-info">
      <strong id="guestNome">—</strong>
      <span class="sep">·</span>
      <span id="guestAmbiente">—</span>
    </div>
    <button class="btn btn-ghost" style="padding:5px 12px;font-size:8px;" onclick="trocarIdentidade()">Trocar</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('pratos',this)">Pratos</button>
    <button class="tab" onclick="showTab('vinhos',this)">Bebidas</button>
  </div>

  <div class="container">
    <div id="tabPratos"></div>
    <div id="tabVinhos" style="display:none;"></div>
  </div>
</div>

<!-- ══ SUCCESS SCREEN ════════════════════════════ -->
<div id="successScreen" class="success-screen">
  <div class="success-icon">✦</div>
  <div class="success-title">Pedido Enviado!</div>
  <div class="success-sub">Seu pedido foi registrado e será atendido em breve.</div>
  <button class="btn btn-gold" onclick="novoPedido()" style="margin-bottom:12px;width:100%;max-width:280px;">
    Fazer Novo Pedido
  </button>
  <br>
  <button class="btn btn-ghost" onclick="trocarIdentidade()" style="width:100%;max-width:280px;">
    Encerrar
  </button>
</div>

<!-- ══ CART FAB ══════════════════════════════════ -->
<button class="cart-fab" id="cartFab" onclick="openCart()">
  Meu Pedido
  <span class="cart-count" id="cartCount">0</span>
</button>

<!-- ══ CART MODAL ════════════════════════════════ -->
<div class="modal-overlay" id="cartOverlay" onclick="closeCartIfOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Meu Pedido</div>
      <button class="modal-close" onclick="closeCart()">✕</button>
    </div>
    <div class="modal-body" id="cartBody"></div>
    <div class="modal-footer">
      <div>
        <div class="cart-total-label">Total</div>
        <div class="cart-total-value" id="cartTotal">R$ 0,00</div>
      </div>
      <button class="btn btn-gold" onclick="confirmarPedido()">Confirmar Pedido</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="app.js"></script>
<script>
  let cart = {}; // id -> qty
  let guestNome = '';
  let guestAmbiente = '';

  // ── BUILD MENU ──
  function buildPratos() {
    const cats = [...new Set(MENU.pratos.map(p => p.categoria))];
    let html = '';
    cats.forEach(cat => {
      html += `<div class="menu-section"><div class="section-title">${cat}</div>`;
      MENU.pratos.filter(p => p.categoria === cat).forEach(item => {
        const qty = cart[item.id] || 0;
        html += `
        <div class="menu-item">
          <div class="menu-item-body">
            <div class="menu-item-cat">${item.categoria}</div>
            <div class="menu-item-name">${item.nome}</div>
            <div class="menu-item-desc">${item.desc}</div>
          </div>
          <div class="menu-item-right">
            <div class="price">${item.preco ? formatMoney(item.preco) : 'A definir'}</div>
            <div class="qty-control">
              <button class="qty-btn" onclick="changeQty('${item.id}', -1)">−</button>
              <div class="qty-num" id="qty-${item.id}">${qty}</div>
              <button class="qty-btn" onclick="changeQty('${item.id}', 1)">+</button>
            </div>
          </div>
        </div>`;
      });
      html += '</div>';
    });
    document.getElementById('tabPratos').innerHTML = html;
  }

  function buildVinhos() {
    const cats = [...new Set(MENU.vinhos.map(v => v.categoria))];
    let html = '';
    cats.forEach(cat => {
      html += `<div class="menu-section"><div class="section-title">${cat}</div>`;
      MENU.vinhos.filter(v => v.categoria === cat).forEach(item => {
        const qty = cart[item.id] || 0;
        const preco = item.preco_taca || item.preco_garrafa;
        const subtipo = item.preco_taca ? 'Taça' : 'Garrafa';
        html += `
        <div class="menu-item">
          <div class="menu-item-body">
            <div class="menu-item-cat">${item.pais || 'Vinho da Casa'}</div>
            <div class="menu-item-name">${item.nome}</div>
            <div class="menu-item-desc">${item.desc}</div>
          </div>
          <div class="menu-item-right">
            <div class="menu-item-subtipo">${subtipo}</div>
            <div class="price">${formatMoney(preco)}</div>
            <div class="qty-control">
              <button class="qty-btn" onclick="changeQty('${item.id}', -1)">−</button>
              <div class="qty-num" id="qty-${item.id}">${qty}</div>
              <button class="qty-btn" onclick="changeQty('${item.id}', 1)">+</button>
            </div>
          </div>
        </div>`;
      });
      html += '</div>';
    });
    document.getElementById('tabVinhos').innerHTML = html;
  }

  // ── TABS ──
  function showTab(tab, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tabPratos').style.display = tab === 'pratos' ? '' : 'none';
    document.getElementById('tabVinhos').style.display = tab === 'vinhos' ? '' : 'none';
  }

  // ── QTY ──
  function changeQty(id, delta) {
    cart[id] = Math.max(0, (cart[id] || 0) + delta);
    const el = document.getElementById('qty-' + id);
    if (el) el.textContent = cart[id];
    updateCartFab();
  }

  function updateCartFab() {
    const total = Object.values(cart).reduce((a, b) => a + b, 0);
    const fab = document.getElementById('cartFab');
    const count = document.getElementById('cartCount');
    count.textContent = total;
    fab.style.display = total > 0 ? 'flex' : 'none';
  }

  // ── CART MODAL ──
  function openCart() {
    const allItems = getAllItems();
    let html = '';
    let totalVal = 0;
    let hasItems = false;

    Object.entries(cart).forEach(([id, qty]) => {
      if (qty === 0) return;
      const item = allItems.find(i => i.id === id);
      if (!item) return;
      hasItems = true;
      const preco = item.preco_display;
      const subtotal = preco ? preco * qty : null;
      if (subtotal) totalVal += subtotal;
      html += `
      <div class="cart-row">
        <div class="cart-row-name">${item.nome}${item.subtipo ? ' <small style="color:var(--muted);font-size:11px;">(${item.subtipo})</small>' : ''}</div>
        <div class="cart-row-qty">× ${qty}</div>
        <div class="cart-row-price">${subtotal ? formatMoney(subtotal) : 'A definir'}</div>
        <button class="cart-row-remove" onclick="removeItem('${id}')">✕</button>
      </div>`;
    });

    if (!hasItems) {
      html = '<div style="text-align:center;padding:32px;color:var(--muted);font-family:Cormorant Garamond,serif;font-style:italic;font-size:16px;">Nenhum item selecionado</div>';
    } else {
      html += `<span class="obs-label">Observações (opcional)</span>
      <textarea class="obs-area" id="obsInput" placeholder="Alergias, preferências, ponto da carne..."></textarea>`;
    }

    document.getElementById('cartBody').innerHTML = html;
    document.getElementById('cartTotal').textContent = formatMoney(totalVal);
    document.getElementById('cartOverlay').classList.add('open');
  }

  function closeCart() {
    document.getElementById('cartOverlay').classList.remove('open');
  }

  function closeCartIfOutside(e) {
    if (e.target === document.getElementById('cartOverlay')) closeCart();
  }

  function removeItem(id) {
    cart[id] = 0;
    const el = document.getElementById('qty-' + id);
    if (el) el.textContent = 0;
    updateCartFab();
    openCart();
  }

  // ── CONFIRM ORDER ──
  async function confirmarPedido() {
    const allItems = getAllItems();
    const itens = [];
    let total = 0;

    Object.entries(cart).forEach(([id, qty]) => {
      if (qty === 0) return;
      const item = allItems.find(i => i.id === id);
      if (!item) return;
      const preco = item.preco_display;
      const subtotal = preco ? preco * qty : null;
      if (subtotal) total += subtotal;
      itens.push({
        id: item.id,
        nome: item.nome,
        tipo_item: item.tipo_item,
        subtipo: item.subtipo || null,
        categoria: item.categoria,
        qty,
        preco_unitario: preco,
        subtotal
      });
    });

    if (itens.length === 0) {
      showToast('Adicione pelo menos um item ao pedido.');
      return;
    }

    const obs = document.getElementById('obsInput');
    const pedido = {
      nome: guestNome,
      ambiente: guestAmbiente,
      itens,
      total,
      observacoes: obs ? obs.value.trim() : ''
    };

    showToast('Enviando pedido...');
    await addPedido(pedido);
    closeCart();
    cart = {};
    updateCartFab();
    buildPratos();
    buildVinhos();

    document.getElementById('menuScreen').style.display = 'none';
    document.getElementById('successScreen').style.display = 'block';
    window.scrollTo(0, 0);
  }

  function novoPedido() {
    document.getElementById('successScreen').style.display = 'none';
    document.getElementById('menuScreen').style.display = 'block';
  }

  // ── IDENTITY ──
  function iniciarPedido() {
    const nome = document.getElementById('inputNome').value.trim();
    const ambiente = document.getElementById('inputAmbiente').value;
    if (!nome) { showToast('Por favor, informe seu nome.'); return; }
    if (!ambiente) { showToast('Por favor, selecione o ambiente.'); return; }
    guestNome = nome;
    guestAmbiente = ambiente;
    document.getElementById('guestNome').textContent = nome;
    document.getElementById('guestAmbiente').textContent = ambiente;
    document.getElementById('identifyScreen').style.display = 'none';
    document.getElementById('menuScreen').style.display = 'block';
    buildPratos();
    buildVinhos();
  }

  function trocarIdentidade() {
    guestNome = '';
    guestAmbiente = '';
    cart = {};
    document.getElementById('successScreen').style.display = 'none';
    document.getElementById('menuScreen').style.display = 'none';
    document.getElementById('identifyScreen').style.display = 'flex';
    document.getElementById('inputNome').value = '';
    document.getElementById('inputAmbiente').value = '';
    updateCartFab();
  }
</script>
</body>
</html>
